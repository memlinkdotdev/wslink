name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build (Native AOT)
        run: dotnet publish src/wslink.csproj -c Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wslink-win-x64
          path: src/bin/Release/net9.0/win-x64/publish/wslink.exe

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create $env:GITHUB_REF_NAME `
            --repo $env:GITHUB_REPOSITORY `
            --title $env:GITHUB_REF_NAME `
            --notes "See https://github.com/memlinkdotdev/wslink/releases for release notes." `
            src/bin/Release/net9.0/win-x64/publish/wslink.exe
