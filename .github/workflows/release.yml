name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target.os }}-${{ matrix.target.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: linux,   arch: amd64, ext: "",   archive: tar.gz }
          - { os: linux,   arch: arm64, ext: "",   archive: tar.gz }
          - { os: windows, arch: amd64, ext: ".exe", archive: zip }
          - { os: windows, arch: arm64, ext: ".exe", archive: zip }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS:   ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: "0"
        run: |
          name="wslink"
          if [ "${{ matrix.target.os }}" = "windows" ]; then
            name="${name}.exe"
          fi
          ver=${GITHUB_REF_NAME:-dev}
          go build -trimpath -ldflags="-s -w -X main.version=${ver}" -o "${name}" .

      - name: Package
        run: |
          version=${GITHUB_REF_NAME:-dev}
          name="wslink-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          bin="wslink${{ matrix.target.ext }}"
          mkdir -p "${name}"
          cp "${bin}" "${name}/"
          cp README.md "${name}/"
          if [ "${{ matrix.target.archive }}" = "tar.gz" ]; then
            tar -czf "${name}.tar.gz" "${name}"
          else
            (cd "${name}" && zip -r "../${name}.zip" .)
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wslink-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: wslink-${{ matrix.target.os }}-${{ matrix.target.arch }}.${{ matrix.target.archive }}

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
